<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="mineAI documentation: self-hosted LLM-powered Minecraft bot runtime by NexurLabs." />
  <title>mineAI Docs</title>
  <link rel="icon" type="image/png" href="https://nexurlabs.com/logo.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css" />
  <style>
    :root {
      --theme-color: #34d399;
      --base-background-color: #06120d;
      --base-color: #d7ffe9;
      --heading-color: #ffffff;
      --sidebar-background: #07140f;
      --sidebar-nav-link-color: #a8d5bf;
      --sidebar-nav-link-color--active: #34d399;
      --code-theme-background: #0b1c14;
      --blockquote-background: rgba(52, 211, 153, 0.08);
      --blockquote-border-color: #34d399;
      --link-color: #34d399;
      --table-cell-border-color: #1f3b2d;
      --table-head-background: #0d2419;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 12%, rgba(52, 211, 153, 0.18), transparent 28rem),
        radial-gradient(circle at 82% 18%, rgba(96, 165, 250, 0.14), transparent 28rem),
        radial-gradient(circle at 55% 90%, rgba(132, 204, 22, 0.12), transparent 26rem);
      z-index: -1;
    }
    .app-name-link { font-weight: 850; letter-spacing: -0.045em; }
    .markdown-section { max-width: 980px; }
    .markdown-section h1 { letter-spacing: -0.055em; }
    .markdown-section h2 { border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: .35rem; }
    .markdown-section pre, .markdown-section table { border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
    .sidebar-toggle { background: rgba(6, 18, 13, .82); }
  </style>
</head>
<body>
  <div id="app">Loading mineAI documentation...</div>
  <script>
    window.$docsify = {
      name: 'mineAI Docs',
      repo: 'nexurlabs/mineAI',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: { placeholder: 'Search mineAI docs', noData: 'No matching docs found', depth: 3 },
      pagination: { previousText: 'Previous', nextText: 'Next' },
      copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
